[workspace]
name = "evo-practical1"
version = "0.1.0"
channels = [
	"conda-forge",
	"bioconda",
	"https://repo.anaconda.com/pkgs/main",
	"https://repo.anaconda.com/pkgs/r",
]
platforms = ["linux-64"]

[dependencies]
# Keep this environment minimal to reduce Docker image size.
# (FastQC is installed via apt; MultiQC via pip; GATK/Picard are installed separately.)

# Trimming
fastp = "*"

# Alignment / BAM / VCF
bwa = "*"
samtools = "*"
bcftools = "*"
tabix = "*"
bamtools = "*"
sambamba = "*"
mosdepth = "*"

# Python scientific stack
numpy = "==1.26.4"
matplotlib = "==3.8.4"
scikit-allel = "==1.3.7"
