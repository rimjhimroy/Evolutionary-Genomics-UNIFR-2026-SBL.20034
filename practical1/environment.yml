name: course
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.12.3
  - pip=26.0.1

  # Workflow
  - mamba=2.1.0
  - snakemake=9.16.2
  - snakemake-minimal=9.16.2
  - snakemake-wrapper-utils=0.8.0
  - snakemake-executor-plugin-cluster-generic=1.0.9
  - toposort=1.10

  # QC / trimming
  - fastqc=0.12.1
  - multiqc=1.33
  - fastp=1.1.0

  # Compression
  - pigz=2.3.4

  # Alignment / BAM / VCF
  - bwa=0.7.18
  - samtools=1.21
  - bcftools=1.21
  - vcflib=1.0.10
  - bamtools=2.5.2
  - tabix=1.11
  - cyvcf2=0.31.1

  # Java tools
  - gatk4=4.6.2.0
  - picard=3.4.0

  # Performance / utilities
  - sambamba=1.0.1
  - qualimap=2.3
  - degenotate=1.3

  # Python scientific stack
  - numpy=2.4.2
  - pandas=3.0.1
  - scipy=1.17.1
  - matplotlib=3.10.8
  - seaborn=0.13.2

  # R
  - r-base=4.3.1
